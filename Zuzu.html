<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zuzu — איפה רוקדים היום?</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@300;400;500;600;700;800&family=Noto+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f0f6f8; --card:#ffffff; --ink:#141414; --muted:#636363; --line:#e0e0e0;
    --accent:#fb4d1e; --accent-soft:#fde8e1; --radius:22px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:"Noto Sans Hebrew","Noto Sans","Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--ink);
       -webkit-font-smoothing:antialiased;line-height:1.4}
  a{color:inherit}
  .wrap{max-width:1080px;margin:0 auto;padding:0 22px}

  /* nav */
  nav{display:flex;justify-content:space-between;align-items:center;padding:20px 0}
  nav .brand{font-weight:800;font-size:1.6rem;letter-spacing:-.02em}
  nav .brand sup{font-size:.45em;font-weight:600;vertical-align:super}
  nav .brandsub{font-size:.85rem;color:var(--muted);margin-top:2px}
  nav .navcount{font-size:.85rem;color:var(--muted)}
  nav .navcount .n{color:var(--accent);font-weight:700;font-variant-numeric:tabular-nums}
  nav .links{display:flex;gap:8px;align-items:center}
  nav .pill{font-size:.82rem;border:1px solid var(--line);background:var(--card);border-radius:999px;
            padding:7px 16px;cursor:pointer;transition:.15s}
  nav .pill:hover{border-color:var(--ink)}
  nav .pill.dark{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* hero */
  .hero{padding:30px 0 26px}
  .eyebrow{font-size:.74rem;letter-spacing:.18em;color:var(--accent);font-weight:600;margin-bottom:18px}
  .hero h1{margin:0;font-size:clamp(2.6rem,7vw,5rem);font-weight:900;letter-spacing:-.03em;line-height:.98}
  .hero h1 .o{color:var(--accent)}
  .hero .sub{margin:20px 0 0;max-width:560px;color:#3a3a3a;font-size:1.05rem;font-weight:300}
  .hero .stat{display:inline-flex;align-items:baseline;gap:7px;margin-top:24px;font-size:.95rem}
  .hero .stat .n{font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
  .hero .stat .t{color:var(--muted);letter-spacing:.02em}

  /* filter bar (sticky) — row of dropdowns */
  .bar{position:sticky;top:0;z-index:20;background:var(--bg);padding:16px 0;margin-top:8px}
  .bar .wrap{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
  .field{display:flex;flex-direction:column;gap:5px;flex:0 1 170px;min-width:130px}
  .field .lab{font-size:.7rem;color:var(--muted);letter-spacing:.12em;padding-inline-start:4px}
  .selWrap{position:relative}
  select.area{appearance:none;-webkit-appearance:none;width:100%;background:var(--card);
        border:1px solid var(--line);color:var(--ink);padding:8px 28px 8px 12px;border-radius:2px;
        cursor:pointer;font-size:.8rem;font-family:inherit;font-weight:500;transition:.15s}
  select.area:hover{border-color:var(--ink)}
  select.area.active{background:#fff;border-color:var(--ink);color:var(--ink)}
  .selWrap::after{content:"▾";position:absolute;left:11px;top:50%;transform:translateY(-50%);
        pointer-events:none;font-size:.62rem;color:var(--muted)}
  .selWrap:has(.active)::after{color:var(--ink)}
  /* custom multiselect */
  .ms{position:relative}
  .ms-btn{width:100%;text-align:start;background:var(--card);border:1px solid var(--line);color:var(--ink);
        padding:8px 28px 8px 12px;border-radius:2px;cursor:pointer;font-size:.8rem;font-family:inherit;
        font-weight:500;transition:.15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ms-btn:hover{border-color:var(--ink)}
  .ms-btn.active{background:#fff;border-color:var(--ink);color:var(--ink)}
  .ms-btn::after{content:"▾";position:absolute;left:11px;top:50%;transform:translateY(-50%);
        font-size:.62rem;color:var(--muted)}
  .ms-btn.active::after{color:var(--ink)}
  .ms-panel{position:absolute;top:calc(100% + 6px);right:0;left:0;background:var(--card);
        border:1px solid var(--line);border-radius:2px;box-shadow:0 12px 34px rgba(0,0,0,.12);
        padding:6px;z-index:40;max-height:280px;overflow:auto;display:none}
  .ms.open .ms-panel{display:block}
  .ms-opt{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:.9rem}
  .ms-opt:hover{background:var(--bg)}
  .ms-opt input{accent-color:var(--accent);width:16px;height:16px;cursor:pointer}
  .ms-opt .cnt{margin-inline-start:auto;font-size:.74rem;color:var(--muted)}
  .ms-clear{width:100%;text-align:center;border:none;background:none;color:var(--accent);font-weight:600;
        font-family:inherit;font-size:.82rem;padding:9px;cursor:pointer;border-top:1px solid var(--line);margin-top:4px}

  main{padding:8px 0 90px}

  /* list = single-column rounded cards */
  .day{display:flex;justify-content:space-between;align-items:baseline;margin:34px 4px 14px}
  .day h2{margin:0;font-size:1.5rem;font-weight:900;letter-spacing:-.02em}
  .day h2 .hot{color:var(--accent)}
  .day .dc{font-size:.74rem;color:var(--muted);letter-spacing:.08em}
  #list,#dayDetail{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;align-items:stretch}
  #dayDetail{margin-top:18px}
  #list .day,#dayDetail .day{grid-column:1/-1}
  .card{display:flex;flex-direction:column;gap:14px;
        background:var(--card);border:1px solid #ececec;border-radius:6px;
        padding:16px 16px 18px;transition:transform .2s cubic-bezier(.16,1,.3,1),box-shadow .2s,border-color .2s;
        text-decoration:none;color:inherit}
  .card:hover{transform:translateY(-3px);box-shadow:0 16px 36px rgba(20,20,20,.09);border-color:#e1e1e1}
  .card .top{display:grid;grid-template-columns:1fr 118px;gap:16px;align-items:start}
  .card .head{min-width:0}
  .card .t{font-size:26px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;line-height:1;letter-spacing:-.01em}
  .card .ti{font-weight:700;font-size:18px;color:#111;margin:10px 0 0;line-height:1.28;text-wrap:pretty}
  .card .pills{display:flex;flex-wrap:wrap;gap:8px}
  .card .pill{font-size:12px;font-weight:600;color:#7754de;background:#fff;border:1px solid #d3c6f2;
              border-radius:999px;padding:4px 12px;line-height:1.3;white-space:nowrap}
  .card .meta{font-size:13px;color:var(--muted);line-height:1.5;margin-top:auto}
  .card .more{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#111}
  .card .more .ar{transition:transform .15s}
  .card:hover .more .ar{transform:translateX(-5px)}
  @media(max-width:900px){#list,#dayDetail{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:600px){#list,#dayDetail{grid-template-columns:1fr}
    .card .top{grid-template-columns:1fr 100px}}
  .thumb{width:118px;height:118px;border-radius:4px;background:#f5f5f5;flex:none;overflow:hidden;
         display:flex;align-items:center;justify-content:center}
  .thumb img{width:88%;height:88%;object-fit:contain;display:block}
  @media(max-width:600px){.thumb{width:100px;height:100px}}
  /* category-color tiles (fallback when no image) */
  .thumb.c-jam{background:#ff4d00}
  .thumb.c-contact{background:#5b6cff}
  .thumb.c-ecstatic{background:#c026d3}
  .thumb.c-gaga{background:#0ea5a4}
  .thumb.c-impro{background:#e8590c}
  .thumb.c-movement{background:#3b3b3b}
  .thumb.c-biodanza{background:#16a34a}
  .thumb.c-yoga{background:#7c3aed}
  .thumb.c-workshop{background:#0284c7}
  .thumb.c-other{background:#8a8377}
  .empty{text-align:center;color:var(--muted);font-weight:300;padding:70px 0}

  /* calendar */
  .calbar{display:flex;align-items:center;justify-content:space-between;margin:26px 4px 16px}
  .calbar h2{margin:0;font-size:1.6rem;font-weight:900;letter-spacing:-.02em}
  .calbar button{background:var(--card);border:1px solid var(--line);width:42px;height:42px;border-radius:999px;
                 font-size:1.1rem;cursor:pointer;font-family:inherit}
  .calbar button:hover{border-color:var(--accent);color:var(--accent)}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#e0e0e0;
           border:1px solid #e0e0e0}
  .dow{font-size:12px;color:#636363;text-align:center;background:#fff;padding:8px 0;font-weight:400}
  .cell{background:#fff;border:none;border-radius:0;min-height:108px;
        padding:6px 8px;cursor:pointer;overflow:hidden;transition:background .12s}
  .cell:hover{background:#fafafa}
  .cell.out{opacity:1}
  .cell.out .dn{color:#d0d0d0}
  .cell.sel{background:#f7f5f2;box-shadow:inset 0 0 0 2px #fb4d1e}
  .cell .dn{font-size:13px;color:#636363;font-weight:400;margin-bottom:4px;line-height:22px}
  .cell.today .dn{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;
                  border-radius:50%;background:#fb4d1e;color:#fff;line-height:1}
  .chipE{display:block;font-size:11.5px;line-height:1.7;margin-bottom:1px;white-space:nowrap;overflow:hidden;
         text-overflow:ellipsis;font-weight:400;color:#3a3a3a}
  .chipE .h{color:#fb4d1e;font-weight:700}
  .moreE{display:block;font-size:11.5px;color:#fb4d1e;font-weight:600;margin-top:2px}
  .dayDetail{margin-top:30px}
  @media(max-width:560px){
    .cell{min-height:62px}
    .chipE{display:none}
    .dotrow{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
    .dot{width:6px;height:6px;border-radius:50%;background:#fb4d1e}
    .card{column-gap:12px;padding:16px 16px}
    .thumb{width:58px;height:58px;font-size:.6rem}
    .topline{gap:8px}
  }
  @media(min-width:561px){ .dotrow{display:none} }

  footer{border-top:1px solid var(--line);margin-top:30px}
  footer .wrap{padding:30px 22px;color:var(--muted);font-size:.78rem;font-weight:300;text-align:center}
  footer .sl{display:block;color:var(--ink);font-weight:600;font-size:1rem;letter-spacing:.02em}

  /* — quiet, slow reveals — */
  @media (prefers-reduced-motion: no-preference){
    .lift{display:inline-block;overflow:hidden;vertical-align:top}
    .lift>span{display:inline-block;transform:translateY(115%);
               animation:liftUp 1.15s cubic-bezier(.16,1,.3,1) forwards}
    .brandsub .lift>span{animation-delay:.18s}
    @keyframes liftUp{to{transform:none}}
    .bar .field{opacity:0;transform:translateY(16px);
                animation:fadeUp .95s cubic-bezier(.16,1,.3,1) forwards}
    .bar .field:nth-child(1){animation-delay:.30s}
    .bar .field:nth-child(2){animation-delay:.38s}
    .bar .field:nth-child(3){animation-delay:.46s}
    .bar .field:nth-child(4){animation-delay:.54s}
    .rv{opacity:0;transform:translateY(26px)}
    .rv.in{animation:fadeUp 1.05s cubic-bezier(.16,1,.3,1) var(--d,0ms) forwards}
    @keyframes fadeUp{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}
  }
</style>
</head>
<body>
<div class="wrap">
  <nav>
    <div class="brandwrap">
      <div class="brand"><span class="lift"><span>Zuzu<sup>®</sup></span></span></div>
      <div class="brandsub"><span class="lift"><span>איפה ואיך זזים היום?</span></span></div>
    </div>
  </nav>

</div>

  <div class="wrap">
    <div class="field"><span class="lab">תצוגה</span><span class="selWrap"><select class="area" id="viewSelect"></select></span></div>

    <div class="field"><span class="lab">סוג</span><div class="ms" id="catMs"></div></div>
    <div class="field"><span class="lab">איפה</span><div class="ms" id="areaMs"></div></div>
  </div>
</div>

<div class="wrap">
  <main>
    <div id="list"></div>
    <div id="calendar" style="display:none">
      <div class="calbar">
        <button id="nextM">‹</button>
        <h2 id="mname"></h2>
        <button id="prevM">›</button>
      </div>
      <div class="calgrid" id="calgrid"></div>
      <div class="dayDetail" id="dayDetail"></div>
    </div>
  </main>
</div>

<footer><div class="wrap">
  <span class="sl">נעשה כדי לזוז. או להזיע. או שניהם.</span>
</div></footer>

const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const HEB_DAYS = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
const HEB_MONTHS = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
const state = {view:"list", when:"tonight", cats:new Set(), regs:new Set(),
               calY:TODAY.getFullYear(), calM:TODAY.getMonth(), selDay:null};

function dateOf(e){ const [y,m,d]=e.date.split("-").map(Number); return new Date(y,m-1,d); }
function iso(dt){ return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0"); }
function fmtDay(dt){
  const diff=Math.round((dt-TODAY)/864e5);
  const base=`יום ${HEB_DAYS[dt.getDay()]} · ${dt.getDate()}.${dt.getMonth()+1}`;
  if(diff===0) return '<span class="hot">הערב</span> · '+base;
  if(diff===1) return "מחר · "+base;
  return base;
}
function passFilters(e){
  if(state.cats.size && !state.cats.has(e.category)) return false;
  if(state.regs.size && !state.regs.has(e.region)) return false;
  return true;
}
function inWhen(e){
  const diff=Math.round((dateOf(e)-TODAY)/864e5);
  if(state.when==="tonight") return diff===0;
  if(state.when==="tomorrow") return diff===1;
  if(state.when==="week") return diff>=0 && diff<7;
  return diff>=0;
}
function setCount(n){ const el=document.getElementById("countNum"); if(el) el.textContent=String(n).padStart(3,"0"); }
// staggered scroll reveals (poeza-style)
const rvIO=new IntersectionObserver(es=>{for(const en of es){if(en.isIntersecting){en.target.classList.add("in");rvIO.unobserve(en.target);}}},{threshold:.06});
function reveal(scope,sel,step,cap){
  if(!scope) return;
  scope.querySelectorAll(sel).forEach((el,i)=>{
    el.classList.add("rv");
    el.style.setProperty("--d",Math.min(i*step,cap)+"ms");
    rvIO.observe(el);
  });
}
const CAT_COLOR={
  "ג'אם":"#ff4d00","קונטקט":"#5b6cff","אקסטטיק":"#c026d3","גאגא":"#7754de",
  "אימפרוביזציה":"#0ea5a4","מובמנט":"#e8590c","ביודנסה":"#16a34a","יוגה":"#2563eb",
  "סדנה":"#0284c7","אחר":"#6b7280"};
function catColor(c){ return "#fb4d1e"; }
function cardHtml(e){
  const t=e.time.replace(/^0/,"");
  const dd=dateOf(e);
  const dateStr=`${HEB_DAYS[dd.getDay()]}, ${dd.getDate()}.${dd.getMonth()+1}.${dd.getFullYear()}`;
  const loc=e.city?`${e.venue}, ${e.city}`:e.venue;
  const rot=(e.title.length%4-1.5)*13;
  return `<a class="card" href="${e.url}" target="_blank">
    <div class="top">
      <div class="head">
        <div class="t">${t}</div>
        <p class="ti">${e.title}</p>
      </div>
      <div class="thumb"><img src="assets/blob-duo.png" alt="" style="transform:rotate(${rot}deg)"></div>
    </div>
    <div class="pills"><span class="pill">${e.category}</span><span class="pill">${e.region}</span></div>
    <div class="meta">${loc} | ${dateStr}</div>
    <div class="more"><span>לפרטים והרשמה</span><span class="ar">←</span></div>
  </a>`;
}

function renderList(){
  const list=document.getElementById("list");
  const evs=EVENTS.filter(e=>passFilters(e)&&inWhen(e));
  setCount(evs.length);
  if(!evs.length){ list.innerHTML='<div class="empty">אין אירועים בסינון הזה — נסו להרחיב את הבחירה ←</div>'; return; }
  const perDay={}; evs.forEach(e=>perDay[e.date]=(perDay[e.date]||0)+1);
  let html="", last="";
  for(const e of evs){
    if(e.date!==last){ html+=`<div class="day"><h2>${fmtDay(dateOf(e))}</h2><span class="dc">${String(perDay[e.date]).padStart(2,"0")} אירועים</span></div>`; last=e.date; }
    html+=cardHtml(e);
  }
  list.innerHTML=html;
  reveal(list,".day,.card,.empty",70,420);
}
function renderCalendar(){
  const {calY,calM}=state;
  document.getElementById("mname").textContent=HEB_MONTHS[calM]+" "+calY;
  const byDay={}; const f=EVENTS.filter(passFilters);
  f.forEach(e=>{ (byDay[e.date]=byDay[e.date]||[]).push(e); });
  setCount(f.filter(e=>{const d=dateOf(e);return d.getFullYear()===calY&&d.getMonth()===calM;}).length);
  const first=new Date(calY,calM,1); const start=new Date(first); start.setDate(1-first.getDay());
  let html=HEB_DAYS.map(d=>`<div class="dow">${d}</div>`).join("");
  const cur=new Date(start);
  for(let i=0;i<42;i++){
    const key=iso(cur);
    const evs=(byDay[key]||[]).slice().sort((a,b)=>a.time<b.time?-1:1);
    const cls=["cell"];
    if(cur.getMonth()!==calM) cls.push("out");
    if(+cur===+TODAY) cls.push("today");
    if(state.selDay===key) cls.push("sel");
    const chips=evs.slice(0,3).map(e=>`<span class="chipE"><span class="h">${e.time}</span> ${e.title}</span>`).join("");
    const more=evs.length>3?`<span class="moreE">+${evs.length-3} נוספים</span>`:"";
    const dots=`<span class="dotrow">${evs.slice(0,5).map(()=>'<span class="dot"></span>').join("")}</span>`;
    html+=`<div class="${cls.join(" ")}" data-day="${key}"><div class="dn">${cur.getDate()}</div>${chips}${more}${dots}</div>`;
    cur.setDate(cur.getDate()+1);
    if(i>=34 && cur.getMonth()!==calM && cur.getDay()===0) break;
  }
  document.getElementById("calgrid").innerHTML=html;
  reveal(document.getElementById("calgrid"),".cell",14,360);
  document.querySelectorAll(".cell").forEach(c=>c.onclick=()=>{ state.selDay=c.dataset.day; renderCalendar(); });
  const box=document.getElementById("dayDetail");
  if(state.selDay){
    const evs=(byDay[state.selDay]||[]).slice().sort((a,b)=>a.time<b.time?-1:1);
    const dt=new Date(state.selDay);
    box.innerHTML=`<div class="day"><h2>${fmtDay(dt)}</h2></div>`+(evs.length?evs.map(cardHtml).join(""):'<div class="empty">אין אירועים ביום הזה</div>');
  } else box.innerHTML="";
  reveal(box,".day,.card,.empty",70,420);
}
function render(){
  const cal=state.view==="cal";
  document.getElementById("calendar").style.display=cal?"block":"none";
  document.getElementById("list").style.display=cal?"none":"grid";
  document.getElementById("whenField").style.display=cal?"none":"flex";
  cal?renderCalendar():renderList();
}
// build a dropdown: options=[[value,label]...]; activeWhenValue means "show orange unless this value"
function dropdown(id, options, onChange, defaultVal, neutralVal){
  const sel=document.getElementById(id);
  sel.innerHTML=options.map(([v,l])=>`<option value="${v}">${l}</option>`).join("");
  sel.value=defaultVal;
  const sync=()=>sel.classList.toggle("active", sel.value!==neutralVal);
  sel.onchange=()=>{ onChange(sel.value); sync(); render(); };
  sync();
}
dropdown("viewSelect",[["list","רשימה"],["cal","לוח חודשי"]],
  v=>state.view=v, "list", "list");

  v=>state.when=v, "tonight", "all");
// custom multiselect (checkbox panel)
function multiselect(id, values, selSet, allLabel){
  const root=document.getElementById(id);
  const counts={}; values.forEach(v=>counts[v]=EVENTS.filter(e=>e[id==="catMs"?"category":"region"]===v).length);
  const opts=values.slice().sort((a,b)=>counts[b]-counts[a]);
  root.innerHTML=`<button class="ms-btn" type="button">${allLabel}</button>
    <div class="ms-panel">${opts.map(v=>`<label class="ms-opt"><input type="checkbox" value="${v}">${v}<span class="cnt">${counts[v]}</span></label>`).join("")}
    <button class="ms-clear" type="button">נקה בחירה</button></div>`;
  const btn=root.querySelector(".ms-btn"), panel=root.querySelector(".ms-panel");
  const refresh=()=>{
    const n=selSet.size;
    btn.textContent = n===0 ? allLabel : (n===1 ? [...selSet][0] : `${n} נבחרו`);
    btn.classList.toggle("active", n>0);
  };
  btn.onclick=e=>{ e.stopPropagation(); document.querySelectorAll(".ms.open").forEach(m=>m!==root&&m.classList.remove("open")); root.classList.toggle("open"); };
  panel.onclick=e=>e.stopPropagation();
  root.querySelectorAll(".ms-opt input").forEach(cb=>cb.onchange=()=>{
    cb.checked?selSet.add(cb.value):selSet.delete(cb.value); refresh(); render();
  });
  root.querySelector(".ms-clear").onclick=()=>{
    selSet.clear(); root.querySelectorAll("input").forEach(c=>c.checked=false); refresh(); render(); root.classList.remove("open");
  };
  refresh();
}
multiselect("catMs",[...new Set(EVENTS.map(e=>e.category))], state.cats, "כל הסוגים");
multiselect("areaMs",[...new Set(EVENTS.map(e=>e.region))], state.regs, "כל האזורים");
reveal(document.querySelector("footer"),".sl",0,0);
document.addEventListener("click",()=>document.querySelectorAll(".ms.open").forEach(m=>m.classList.remove("open")));
render();
</script>
