<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zuzu — איפה רוקדים היום?</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF4F7; --ink:#0a0a0a; --muted:#8a8a8a; --line:#0a0a0a; --hair:#e7e7e7;
    --accent:#ff3a00; --card:#ffffff;
  }
  body[data-accent="ember"]{--accent:#ff5c1a}
  body[data-accent="ink"]{--accent:#0a0a0a}
  body[data-accent="blue"]{--accent:#1f3cff}
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:"Heebo","Noto Sans Hebrew","Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--ink);
       -webkit-font-smoothing:antialiased;line-height:1.35}
  a{color:inherit}
  .wrap{max-width:1080px;margin:0 auto;padding:0 22px}

  /* top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:18px;
          padding:22px 0 0;font-size:.8rem}
  .topbar a{text-decoration:none}
  .topbar .tcenter{display:flex;gap:16px;align-items:center}
  .topbar .tcenter span{opacity:.4}
  .topbar .tmark{font-weight:800;letter-spacing:-.01em;font-size:.95rem}
  .topbar .tcontact{display:inline-flex;align-items:center;gap:9px;font-weight:600;cursor:pointer}
  .topbar .tcontact::before{content:"";width:10px;height:10px;border-radius:50%;background:var(--accent)}

  /* stage / hero */
  .stage{position:relative;padding:6px 0 28px}
  .wordrow{position:relative}
  .word{margin:.05em 0 0;font-weight:900;line-height:.8;letter-spacing:-.05em;position:relative;z-index:1;
        font-size:clamp(4.2rem,17vw,14rem);direction:ltr;text-align:start}
  .word .dot{color:var(--accent)}
  .disc{display:block;border-radius:50%;background:var(--accent);
        width:clamp(70px,11vw,178px);aspect-ratio:1;margin-top:24px}
  .f1wrap{grid-column:2/6;display:flex;flex-direction:column;align-items:flex-start}
  .band{display:grid;grid-template-columns:repeat(12,1fr);gap:18px;align-items:start;
        margin-top:clamp(26px,6vw,80px)}
  .frag{font-size:clamp(1rem,1.5vw,1.35rem);font-weight:400;line-height:1.16;margin:0}
  .frag.f1{grid-column:2/6}
  .frag.f2{grid-column:9/13;margin-top:clamp(20px,4vw,56px)}
  .tile{position:absolute;top:clamp(40px,7vw,120px);inset-inline-end:1%;
        width:clamp(360px,48vw,660px);z-index:0;background:transparent;pointer-events:none}
  .tile img{display:block;width:100%;height:auto;object-fit:contain}
  .statement{font-size:clamp(2rem,6.2vw,5.2rem);font-weight:400;line-height:1.0;letter-spacing:-.025em;
             margin:clamp(34px,8vw,92px) 0 0;max-width:16ch;margin-inline-start:auto;text-align:start}
  .statement .o{color:var(--accent)}
  .cue{margin-top:28px;font-size:.76rem;letter-spacing:.16em;color:var(--muted)}
  body[data-dir="centered"] .word{text-align:center}
  body[data-dir="centered"] .statement{margin-inline:auto;text-align:center}
  body[data-dir="centered"] .cue{text-align:center}
  body[data-dir="compact"] .stage{padding-bottom:0}
  body[data-dir="compact"] .band{margin-top:24px}
  body[data-dir="compact"] .statement{font-size:clamp(1.6rem,4.4vw,3.2rem);margin-top:32px}
  @media(max-width:680px){
    .band{grid-template-columns:1fr 1fr;gap:14px}
    .frag.f1{grid-column:1/2}
    .frag.f2{grid-column:2/3;margin-top:0}
    .tile{position:static;grid-column:1/3;margin-top:10px;width:auto;max-width:100%;inset:auto}
    .statement{max-width:none}
  }

  /* filter bar — minimal underline */
  .bar{position:sticky;top:0;z-index:20;background:var(--bg);padding:14px 0;margin-top:20px;border-bottom:1px solid transparent;transition:border-color .25s,box-shadow .25s}
  .bar.scrolled{border-bottom-color:var(--ink)}
  .bar .wrap{display:flex;flex-wrap:wrap;gap:14px 30px;align-items:flex-end}
  .field{display:flex;flex-direction:column;gap:6px;flex:0 1 auto;min-width:108px}
  .field .lab{font-size:.6rem;color:var(--muted);letter-spacing:.2em;text-transform:lowercase}
  .selWrap{position:relative}
  select.area,.ms-btn{appearance:none;-webkit-appearance:none;width:100%;background:transparent;
        border:none;border-bottom:1.5px solid var(--ink);color:var(--ink);padding:5px 2px 6px 20px;border-radius:0;
        cursor:pointer;font-size:.95rem;font-family:inherit;font-weight:700;transition:.15s;letter-spacing:-.01em}
  select.area:hover,.ms-btn:hover{color:var(--accent);border-color:var(--accent)}
  select.area.active,.ms-btn.active{color:var(--accent);border-color:var(--accent)}
  .selWrap::after,.ms-btn::after{content:"↓";position:absolute;left:2px;top:50%;transform:translateY(-50%);
        pointer-events:none;font-size:.72rem;color:currentColor}
  .ms{position:relative}
  .ms-btn{text-align:start;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ms-panel{position:absolute;top:calc(100% + 8px);right:0;left:auto;min-width:210px;background:var(--bg);
        border:1px solid var(--ink);border-radius:0;box-shadow:7px 7px 0 var(--ink);
        padding:5px;z-index:40;max-height:300px;overflow:auto;display:none}
  .ms.open .ms-panel{display:block}
  .ms-opt{display:flex;align-items:center;gap:9px;padding:8px 10px;cursor:pointer;font-size:.9rem;font-weight:500}
  .ms-opt:hover{background:var(--ink);color:var(--bg)}
  .ms-opt input{accent-color:var(--accent);width:15px;height:15px;cursor:pointer}
  .ms-opt .cnt{margin-inline-start:auto;font-size:.72rem;color:var(--muted)}
  .ms-opt:hover .cnt{color:var(--bg)}
  .ms-clear{width:100%;text-align:start;border:none;background:none;color:var(--accent);font-weight:700;
        font-family:inherit;font-size:.8rem;padding:8px 10px;cursor:pointer;border-top:1px solid var(--ink);margin-top:3px}

  main{padding:30px 0 90px}

  /* list */
  .day{display:flex;justify-content:space-between;align-items:baseline;margin:40px 0 18px}
  .day h2{margin:0;font-size:clamp(1.4rem,2.6vw,2rem);font-weight:900;letter-spacing:-.03em}
  .day h2 .hot{color:var(--accent)}
  .day .dc{font-size:.66rem;color:var(--muted);letter-spacing:.16em;text-transform:lowercase}
  #list,#dayDetail{display:flex;flex-direction:column;gap:12px}
  #dayDetail{margin-top:18px}
  .card{display:flex;align-items:center;gap:22px;background:var(--card);
        border:none;padding:16px 22px;text-decoration:none;color:var(--ink);
        transition:background .28s cubic-bezier(.16,1,.3,1),color .28s,transform .28s,box-shadow .28s}
  .card:hover{transform:translateY(-3px)}
  .card .thumb{flex:none;width:76px;height:76px;aspect-ratio:1;background:var(--ink);position:relative;overflow:hidden}
  .card .thumb img{position:absolute;inset:15%;width:70%;height:70%;object-fit:contain;transition:opacity .28s}
  .card .thumb .bk{opacity:0}
  .card .t{flex:none;width:92px;text-align:start;font-size:clamp(1.5rem,2.2vw,1.9rem);font-weight:800;color:var(--accent);
           font-variant-numeric:tabular-nums;line-height:1;letter-spacing:-.02em}
  .card .main{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;gap:8px}
  .card .ti{font-weight:700;font-size:1.02rem;margin:0;line-height:1.25;text-wrap:pretty}
  .card .info{display:flex;align-items:baseline;gap:4px 18px;flex-wrap:wrap}
  .card .labels{display:flex;flex-wrap:wrap;gap:4px 14px;font-size:.72rem;letter-spacing:.03em;color:var(--ink)}
  .card .labels span{display:inline-flex;align-items:center;gap:6px}
  .card .labels span::before{content:"/";color:var(--accent);font-weight:700}
  .card .meta{font-size:.77rem;color:var(--muted);line-height:1.5}
  .card .end{flex:none;display:flex;align-items:center}
  .card .more{display:flex;align-items:center;gap:8px;font-size:.85rem;font-weight:700;white-space:nowrap}
  .card .more .ar{transition:transform .15s}
  /* invert hover */
  body[data-cards="invert"] .card:hover{background:var(--ink);color:var(--bg)}
  body[data-cards="invert"] .card:hover .thumb{background:var(--bg)}
  body[data-cards="invert"] .card:hover .thumb .bw{opacity:0}
  body[data-cards="invert"] .card:hover .thumb .bk{opacity:1}
  body[data-cards="invert"] .card:hover .meta{color:rgba(255,255,255,.55)}
  body[data-cards="invert"] .card:hover .labels{color:var(--bg)}
  body[data-cards="invert"] .card:hover .more .ar{transform:translateX(-5px)}
  /* outline hover */
  body[data-cards="outline"] .card:hover{border-color:var(--accent)}
  body[data-cards="outline"] .card:hover .more{color:var(--accent)}
  body[data-cards="outline"] .card:hover .more .ar{transform:translateX(-5px)}
  /* minimal: no thumb */
  body[data-cards="minimal"] .card .thumb{display:none}
  body[data-cards="minimal"] .card:hover{border-color:var(--accent)}
  body[data-cards="minimal"] .card:hover .more{color:var(--accent)}
  body[data-cards="minimal"] .card:hover .more .ar{transform:translateX(-5px)}
  @media(max-width:680px){
    .card{flex-wrap:wrap;gap:8px 18px;padding:14px 16px}
    .card .t{width:auto}
    .card .main{flex:1 1 60%}
    .card .info{flex-direction:column;gap:5px}
    .card .end{flex:1 1 100%;justify-content:flex-start;
               border-top:1px solid var(--hair);padding-top:10px;margin-top:2px}
  }
  .empty{text-align:start;color:var(--muted);font-weight:300;padding:50px 0;font-size:1.1rem}

  /* calendar — mono grid */
  .calbar{display:flex;align-items:center;justify-content:space-between;margin:30px 0 18px}
  .calbar h2{margin:0;font-size:clamp(1.5rem,3vw,2.2rem);font-weight:900;letter-spacing:-.03em;text-transform:lowercase}
  .calbar button{background:var(--bg);border:1px solid var(--ink);width:44px;height:44px;border-radius:0;
                 font-size:1.1rem;cursor:pointer;font-family:inherit;transition:.15s}
  .calbar button:hover{background:var(--ink);color:var(--bg)}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:0;border:none;background:var(--card);
           border-radius:4px;overflow:hidden;box-shadow:0 2px 10px rgba(20,40,60,.05),0 12px 28px rgba(20,40,60,.06)}
  .dow{font-size:.6rem;color:var(--muted);text-align:start;background:var(--card);padding:8px;font-weight:700;
       letter-spacing:.1em;text-transform:lowercase;border-inline-start:1px solid var(--hair);border-bottom:1px solid var(--hair)}
  .dow:first-child{border-inline-start:none}
  .cell{background:var(--card);border:none;border-inline-start:1px solid var(--hair);border-bottom:1px solid var(--hair);
        min-height:112px;padding:7px 8px;cursor:pointer;overflow:hidden;transition:background .12s}
  .cell:nth-child(7n+1){border-inline-start:none}
  .cell:hover{background:#fafafa}
  .cell.out .dn{color:#cfcfcf}
  .cell.sel{box-shadow:inset 0 0 0 2px var(--accent)}
  .cell .dn{font-size:.8rem;color:var(--ink);font-weight:700;margin-bottom:5px;line-height:22px}
  .cell.today .dn{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;
                  border-radius:50%;background:var(--accent);color:#fff}
  .chipE{display:block;font-size:.68rem;line-height:1.6;margin-bottom:1px;white-space:nowrap;overflow:hidden;
         text-overflow:ellipsis;font-weight:500;color:var(--ink)}
  .chipE .h{color:var(--accent);font-weight:700}
  .moreE{display:block;font-size:.66rem;color:var(--accent);font-weight:700;margin-top:2px}
  .dayDetail{margin-top:30px}
  @media(max-width:560px){
    .cell{min-height:64px}
    .chipE,.moreE{display:none}
    .dotrow{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
    .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
  }
  @media(min-width:561px){ .dotrow{display:none} }

  footer{border-top:1px solid var(--ink);margin-top:60px}
  footer .wrap{padding:40px 0;display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap}
  footer .sl{display:block;color:var(--ink);font-weight:900;font-size:clamp(1.6rem,4vw,3rem);letter-spacing:-.03em;line-height:.95;max-width:18ch}
  footer .fmark{font-size:.7rem;color:var(--muted);letter-spacing:.08em}

  /* tweaks panel */
  #tweaks{position:fixed;bottom:18px;inset-inline-end:18px;width:248px;background:var(--bg);
          border:1px solid var(--ink);box-shadow:8px 8px 0 var(--ink);z-index:9000;font-size:.82rem;display:none}
  #tweaks.show{display:block}
  #tweaks header{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-bottom:1px solid var(--ink);cursor:move;user-select:none}
  #tweaks header b{font-weight:800;letter-spacing:.02em}
  #tweaks header button{border:none;background:none;font-size:1.2rem;cursor:pointer;line-height:1;color:var(--ink)}
  #tweaks .tk{padding:11px 13px;border-bottom:1px solid var(--hair)}
  #tweaks .tk:last-child{border-bottom:none}
  #tweaks .tk .lab{font-size:.6rem;letter-spacing:.16em;text-transform:lowercase;color:var(--muted);margin-bottom:8px}
  #tweaks .seg{display:flex;border:1px solid var(--ink)}
  #tweaks .seg button{flex:1;border:none;background:var(--bg);padding:7px 4px;font-family:inherit;font-size:.74rem;font-weight:600;cursor:pointer;border-inline-start:1px solid var(--ink);color:var(--ink)}
  #tweaks .seg button:first-child{border-inline-start:none}
  #tweaks .seg button.on{background:var(--ink);color:var(--bg)}
  #tweaks .sw{display:flex;gap:9px}
  #tweaks .sw button{width:26px;height:26px;border:1px solid var(--ink);cursor:pointer;padding:0;border-radius:50%}
  #tweaks .sw button.on{box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--ink)}

  /* — motion — */
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
  @keyframes drift{0%,100%{transform:translate(0,0) rotate(0)}50%{transform:translate(8px,-10px) rotate(6deg)}}
  @media (prefers-reduced-motion: no-preference){
    .lift{display:inline-block;overflow:hidden;vertical-align:top}
    .lift>span{display:inline-block;transform:translateY(115%);
               animation:liftUp 1.15s cubic-bezier(.16,1,.3,1) forwards}
    @keyframes liftUp{to{transform:none}}
    .bar .field{opacity:0;transform:translateY(16px);
                animation:fadeUp .95s cubic-bezier(.16,1,.3,1) forwards}
    .bar .field:nth-child(1){animation-delay:.30s}
    .bar .field:nth-child(2){animation-delay:.38s}
    .bar .field:nth-child(3){animation-delay:.46s}
    .bar .field:nth-child(4){animation-delay:.54s}
    .rv{opacity:0;transform:translateY(26px)}
    .rv.in{animation:fadeUp 1.05s cubic-bezier(.16,1,.3,1) var(--d,0ms) forwards}
    @keyframes fadeUp{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}
    body:not([data-motion="off"]) .disc{animation:floaty 7s ease-in-out infinite}
    body[data-motion="lively"] .disc{animation:floaty 4.4s ease-in-out infinite}
    body:not([data-motion="off"]) .tile img{animation:drift 9s ease-in-out infinite}
    body[data-motion="off"] .lift>span{transform:none;animation:none}
    body[data-motion="off"] .bar .field{opacity:1;transform:none;animation:none}
    body[data-motion="off"] .rv{opacity:1;transform:none;animation:none}
  }
</style>
</head>

<div class="wrap">
  <div class="topbar">
    <span class="tmark">zuzu®</span>

    <div class="field"><span class="lab">סוג</span><div class="ms" id="catMs"></div></div>

</div>

<div class="wrap">
  <main>
    <div id="list"></div>

      <div class="dayDetail" id="dayDetail"></div>
    </div>
  </main>
</div>

<footer><div class="wrap">

</div></footer>

function iso(dt){ return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0"); }

  const diff=Math.round((dt-TODAY)/864e5);

    btn.classList.toggle("active", n>0);
  };
  btn.onclick=e=>{ e.stopPropagation(); document.querySelectorAll(".ms.open").forEach(m=>m!==root&&m.classList.remove("open")); root.classList.toggle("open"); };
  panel.onclick=e=>e.stopPropagation();
  root.querySelectorAll(".ms-opt input").forEach(cb=>cb.onchange=()=>{
    cb.checked?selSet.add(cb.value):selSet.delete(cb.value); refresh(); render();
  });
  root.querySelector(".ms-clear").onclick=()=>{
    selSet.clear(); root.querySelectorAll("input").forEach(c=>c.checked=false); refresh(); render(); root.classList.remove("open");
  };
  refresh();
}
const __bar=document.querySelector(".bar");
function __barShadow(){ if(__bar) __bar.classList.toggle("scrolled", window.scrollY>4); }
window.addEventListener("scroll",__barShadow,{passive:true}); __barShadow();
multiselect("catMs",[...new Set(EVENTS.flatMap(e=>[e.category,...(e.tags||[])]))], state.cats, "כל הסוגים");
multiselect("areaMs",[...new Set(EVENTS.map(e=>e.region))], state.regs, "כל האזורים");
reveal(document.querySelector("footer"),".sl",0,0);
document.addEventListener("click",()=>document.querySelectorAll(".ms.open").forEach(m=>m.classList.remove("open")));
render();
</script>

<script>
/* ---- Tweaks panel (vanilla, host-protocol aware) ---- */
(function(){
  const KEY="zuzu_blit_tweaks";
  const DEF={dir:"gallery",accent:"flame",cards:"minimal",motion:"subtle"};
  let tw=Object.assign({},DEF);
  try{tw=Object.assign(tw,JSON.parse(localStorage.getItem(KEY)||"{}"));}catch(e){}
  function apply(){
    const b=document.body;
    if(tw.accent&&tw.accent!=="flame")b.setAttribute("data-accent",tw.accent);else b.removeAttribute("data-accent");
    b.setAttribute("data-dir",tw.dir);
    b.setAttribute("data-cards",tw.cards);
    b.setAttribute("data-motion",tw.motion);
  }
  apply();
  const p=document.createElement("div"); p.id="tweaks";
  p.innerHTML=`<header><b>Tweaks</b><button id="tkClose" title="close">×</button></header>
   <div class="tk"><div class="lab">כיוון</div><div class="seg" data-k="dir">
     <button data-v="gallery">גלריה</button><button data-v="centered">ממורכז</button><button data-v="compact">קומפקטי</button></div></div>
   <div class="tk"><div class="lab">צבע הדגשה</div><div class="sw" data-k="accent">
     <button data-v="flame" style="background:#ff3a00"></button>
     <button data-v="ember" style="background:#ff5c1a"></button>
     <button data-v="blue" style="background:#1f3cff"></button>
     <button data-v="ink" style="background:#0a0a0a"></button></div></div>
   <div class="tk"><div class="lab">סגנון כרטיס</div><div class="seg" data-k="cards">
     <button data-v="invert">היפוך</button><button data-v="outline">מתאר</button><button data-v="minimal">מינימלי</button></div></div>
   <div class="tk"><div class="lab">תנועה</div><div class="seg" data-k="motion">
     <button data-v="off">כבוי</button><button data-v="subtle">עדין</button><button data-v="lively">חי</button></div></div>`;
  document.body.appendChild(p);
  function sync(){p.querySelectorAll("[data-k]").forEach(g=>{const k=g.dataset.k;g.querySelectorAll("button").forEach(b=>b.classList.toggle("on",b.dataset.v===tw[k]));});}
  p.querySelectorAll("[data-k] button").forEach(b=>b.onclick=()=>{const k=b.parentElement.dataset.k;tw[k]=b.dataset.v;localStorage.setItem(KEY,JSON.stringify(tw));apply();sync();});
  sync();
  p.querySelector("#tkClose").onclick=()=>{p.classList.remove("show");window.parent.postMessage({type:"__edit_mode_dismissed"},"*");};
  window.addEventListener("message",e=>{const t=e&&e.data&&e.data.type;if(t==="__activate_edit_mode")p.classList.add("show");else if(t==="__deactivate_edit_mode")p.classList.remove("show");});
  window.parent.postMessage({type:"__edit_mode_available"},"*");
  const hd=p.querySelector("header");let dx=0,dy=0,drag=false;
  hd.addEventListener("mousedown",e=>{if(e.target.id==="tkClose")return;drag=true;const r=p.getBoundingClientRect();dx=e.clientX-r.left;dy=e.clientY-r.top;});
  window.addEventListener("mousemove",e=>{if(!drag)return;p.style.left=(e.clientX-dx)+"px";p.style.top=(e.clientY-dy)+"px";p.style.right="auto";p.style.bottom="auto";p.style.insetInlineEnd="auto";});
  window.addEventListener("mouseup",()=>drag=false);
})();
</script>
